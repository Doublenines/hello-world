<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doublenines</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .logo { width: 220px; height: 220px; margin-bottom: 32px; }
    h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; }
    p { margin-top: 12px; font-size: 1rem; font-weight: 400; color: #333; }
  </style>
</head>
<body>
  <svg class="logo" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
    <!-- Blue 9 -->
    <circle cx="80" cy="82" r="62" fill="#1A9FE0"/>
    <path d="M80,144 L57,200 Q54,210 64,210 L80,210 Q88,210 92,202 L118,144 Z" fill="#1A9FE0"/>
    <!-- Pink 9 -->
    <circle cx="140" cy="82" r="62" fill="#E6007E"/>
    <path d="M140,144 L117,200 Q114,210 124,210 L140,210 Q148,210 152,202 L178,144 Z" fill="#E6007E"/>
    <!-- Overlap blend area (darker purple where circles meet) -->
    <clipPath id="blueCircle"><circle cx="80" cy="82" r="62"/></clipPath>
    <circle cx="140" cy="82" r="62" fill="#C0006A" clip-path="url(#blueCircle)"/>
    <!-- White divider line -->
    <line x1="110" y1="30" x2="110" y2="134" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <!-- Blue 9 dots (3x3 grid) -->
    <g fill="white">
      <circle cx="57" cy="62" r="6"/><circle cx="75" cy="62" r="6"/><circle cx="93" cy="62" r="6"/>
      <circle cx="57" cy="82" r="6"/><circle cx="75" cy="82" r="6"/><circle cx="93" cy="82" r="6"/>
      <circle cx="57" cy="102" r="6"/><circle cx="75" cy="102" r="6"/><circle cx="93" cy="102" r="6"/>
    </g>
    <!-- Pink 9 dots (3x3 grid) -->
    <g fill="white">
      <circle cx="120" cy="62" r="6"/><circle cx="138" cy="62" r="6"/><circle cx="156" cy="62" r="6"/>
      <circle cx="120" cy="82" r="6"/><circle cx="138" cy="82" r="6"/><circle cx="156" cy="82" r="6"/>
      <circle cx="120" cy="102" r="6"/><circle cx="138" cy="102" r="6"/><circle cx="156" cy="102" r="6"/>
    </g>
  </svg>
  <h1>Doublenines</h1>
  <p>Hello, World.</p>
</body>
</html>
